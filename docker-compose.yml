services:
  postgres:
    image: postgres:16-alpine
    container_name: notification-preferences-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notification_preferences
    ports:
      - "5433:5432"
    volumes:
      - notification_preferences_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notification_preferences"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notification-preferences-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/notification_preferences
      LOG_LEVEL: info
    ports:
      - "3000:3000"

volumes:
  notification_preferences_pgdata: